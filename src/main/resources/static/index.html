<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PingWatch Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 30px; }
        h1 { color: #38bdf8; font-size: 2rem; margin-bottom: 8px; }
        p.subtitle { color: #94a3b8; margin-bottom: 30px; }

        .add-form { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 10px; }
        .add-form input { padding: 10px; border-radius: 6px; border: none; background: #0f172a; color: white; flex: 1; font-size: 14px; }
        .add-form button { padding: 10px 20px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .add-form button:hover { background: #7dd3fc; }

        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th { background: #38bdf8; color: #0f172a; padding: 14px; text-align: left; }
        td { padding: 14px; border-bottom: 1px solid #0f172a; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #273549; }

        .up { color: #4ade80; font-weight: bold; }
        .down { color: #f87171; font-weight: bold; }
        .ping-btn { padding: 6px 14px; background: #334155; color: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; }
        .ping-btn:hover { background: #475569; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .refresh { padding: 8px 16px; background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🔍 PingWatch</h1>
        <p class="subtitle">Real-time website uptime monitor</p>
    </div>
    <button class="refresh" onclick="loadStatus()">↻ Refresh</button>
</div>

<!-- Add URL Form -->
<div class="add-form">
    <input id="urlInput" type="text" placeholder="https://example.com" />
    <input id="nameInput" type="text" placeholder="Name (e.g. Google)" />
    <button onclick="addUrl()">+ Add URL</button>
</div>

<!-- Status Table -->
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>URL</th>
        <th>Status</th>
        <th>Uptime %</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="statusTable">
    <tr><td colspan="5" style="text-align:center; color:#94a3b8">Loading...</td></tr>
    </tbody>
</table>

<script>
    // Load status of all URLs
    async function loadStatus() {
        const res = await fetch('/api/status');
        const data = await res.json();
        const tbody = document.getElementById('statusTable');

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#94a3b8">No URLs monitored yet. Add one above!</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(item => `
        <tr>
          <td>${item.name}</td>
          <td><a href="${item.url}" target="_blank" style="color:#38bdf8">${item.url}</a></td>
          <td class="${item.uptimePercent > 0 ? 'up' : 'down'}">
            ${item.uptimePercent > 0 ? '✅ UP' : '❌ DOWN'}
          </td>
          <td>${item.uptimePercent.toFixed(1)}%</td>
          <td><button class="ping-btn" onclick="pingNow('${item.url}')">Ping Now</button></td>
        </tr>
      `).join('');
    }

    // Add a new URL
    async function addUrl() {
        const url = document.getElementById('urlInput').value;
        const name = document.getElementById('nameInput').value;
        if (!url || !name) { alert('Please fill both fields!'); return; }

        await fetch('/api/monitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, name })
        });

        document.getElementById('urlInput').value = '';
        document.getElementById('nameInput').value = '';
        loadStatus();
    }

    // Manually ping a URL
    async function pingNow(url) {
        await fetch(`/api/ping?url=${encodeURIComponent(url)}`);
        loadStatus();
    }

    // Load on page open
    loadStatus();

    // Auto refresh every 30 seconds
    setInterval(loadStatus, 30000);
</script>
</body>
</html>
